<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Shop Erode - FSD Lab</title>
    <style>
        :root {
            --primary: #2563eb; 
            --accent: #3b82f6;
            --danger: #dc2626;
            --bg: #f1f5f9;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Inventory Panel */
        .inventory-section {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header-title {
            margin-bottom: 35px;
            border-left: 6px solid var(--primary);
            padding-left: 20px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: var(--white);
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            text-align: center;
            transition: 0.2s ease-in-out;
        }

        .item-card:hover { transform: translateY(-5px); }

        /* Large Sidebar Cart */
        .cart-sidebar {
            width: 480px; 
            background: var(--white);
            border-left: 1px solid #cbd5e1;
            display: flex;
            flex-direction: column;
        }

        .cart-top {
            padding: 30px;
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #cart-items-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px;
            background: #f8fafc;
            margin-bottom: 12px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
        }

        /* Interactive Elements */
        button { cursor: pointer; border: none; font-weight: bold; border-radius: 8px; }

        .btn-add { background: var(--primary); color: white; width: 100%; padding: 14px; margin-top: 15px; }
        .btn-add:hover { background: #1e40af; }

        .qty-box {
            display: flex;
            align-items: center;
            gap: 15px;
            background: white;
            padding: 6px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 20px;
        }

        .btn-qty { background: transparent; color: var(--primary); font-size: 1.2rem; }

        .footer-summary {
            padding: 30px;
            background: var(--white);
            border-top: 3px solid var(--primary);
        }

        .checkout-big-btn {
            background: #059669; /* Green for payment */
            color: white;
            width: 100%;
            padding: 20px;
            font-size: 1.2rem;
            margin-top: 15px;
        }

        .total-price { font-size: 2.2rem; font-weight: 800; color: #0f172a; }
    </style>
</head>
<body>

    <div class="inventory-section">
        <div class="header-title">
            <h1>Tech Shop Erode</h1>
            <p>Quality gadgets for your lifestyle</p>
        </div>
        <div class="products-grid" id="product-grid"></div>
    </div>

    <div class="cart-sidebar">
        <div class="cart-top">
            <h2 style="margin:0">Items in Cart</h2>
            <button onclick="cart.clear()" style="background:rgba(255,255,255,0.2); color:white; padding:8px 12px;">Clear All</button>
        </div>

        <div id="cart-items-container"></div>

        <div class="footer-summary">
            <div style="display:flex; justify-content:space-between; align-items:center">
                <span style="font-weight:600; color:#64748b">TOTAL PAYABLE:</span>
                <span class="total-price">₹<span id="grand-total">0</span></span>
            </div>
            <button class="checkout-big-btn" onclick="cart.checkout()">PROCEED TO PAY</button>
        </div>
    </div>

<script>
    // 1. Data Structure
    const products = [
        { id: 1, name: "Wireless Headphones", price: 2499, cat: "Audio" },
        { id: 2, name: "Fitness Tracker", price: 1800, cat: "Wearable" },
        { id: 3, name: "Gaming Mouse", price: 950, cat: "PC Gear" },
        { id: 4, name: "Mechanical Keyboard", price: 3200, cat: "PC Gear" },
        { id: 5, name: "512GB Pen Drive", price: 1550, cat: "Storage" },
        { id: 6, name: "HD Webcam", price: 2800, cat: "Streaming" },
        { id: 7, name: "Curved Monitor", price: 14500, cat: "Display" },
        { id: 8, name: "Bluetooth Speaker", price: 1200, cat: "Audio" }
    ];

    // 2. Logic Manager (Array operations)
    const cart = {
        data: [],

        add(pId) {
            const prod = products.find(p => p.id === pId);
            const inCart = this.data.find(item => item.id === pId);
            inCart ? inCart.qty++ : this.data.push({ ...prod, qty: 1 });
            this.render();
        },

        updateQty(id, change) {
            const item = this.data.find(i => i.id === id);
            if (item) {
                item.qty += change;
                if (item.qty <= 0) this.data = this.data.filter(i => i.id !== id);
            }
            this.render();
        },

        clear() {
            if(this.data.length === 0) return;
            if(confirm("Empty the entire cart?")) { 
                this.data = []; 
                this.render(); 
            }
        },

        checkout() {
            if(this.data.length === 0) return alert("Your cart is empty!");
            alert(`Order Confirmed!\nAmount Paid: ₹${this.calculateTotal()}\n\nThank you for shopping at Tech Shop Erode!`);
            this.data = [];
            this.render();
        },

        calculateTotal() {
            return this.data.reduce((sum, item) => sum + (item.price * item.qty), 0).toLocaleString('en-IN');
        },

        render() {
            const container = document.getElementById('cart-items-container');
            const totalDisplay = document.getElementById('grand-total');

            container.innerHTML = this.data.length === 0 
                ? `<div style="text-align:center; margin-top:80px; color:#94a3b8">Your shopping cart is empty</div>` 
                : this.data.map(item => `
                    <div class="cart-row">
                        <div style="flex:1">
                            <div style="font-weight:bold; color:#1e293b">${item.name}</div>
                            <div style="font-size:0.9rem; color:var(--primary)">₹${item.price.toLocaleString('en-IN')}</div>
                        </div>
                        <div class="qty-box">
                            <button class="btn-qty" onclick="cart.updateQty(${item.id}, -1)">−</button>
                            <span>${item.qty}</span>
                            <button class="btn-qty" onclick="cart.updateQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                `).join('');

            totalDisplay.innerText = this.calculateTotal();
        }
    };

    // 3. Initialize Grid
    function init() {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = products.map(p => `
            <div class="item-card">
                <div style="font-size:0.7rem; color:#64748b; font-weight:bold">${p.cat}</div>
                <h3 style="margin:10px 0;">${p.name}</h3>
                <div style="font-size:1.4rem; font-weight:800; color:#1e293b; margin-bottom:15px">₹${p.price.toLocaleString('en-IN')}</div>
                <button class="btn-add" onclick="cart.add(${p.id})">ADD TO CART</button>
            </div>
        `).join('');
    }

    init();
</script>
</body>
</html>
